name: Update Graypaper

on:
  push:
    branches:
      - 'feature/auto-update-workflow'
  workflow_dispatch:
  schedule:
    - cron: "38 13 * * *" # using an arbitrary time to avoid high traffic

jobs:
  check_for_updates:
    name: Check for updates
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      has_updates: ${{steps.remote_release.outputs.VERSION != steps.local_release.outputs.VERSION}}
      release_tag: ${{steps.remote_release.outputs.VERSION}}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: What's the latest graypaper release?
      id: remote_release
      run: |
        REMOTE_TAG=$(gh api /repos/gavofyork/graypaper/releases/latest --jq '.tag_name')
        echo "VERSION=$REMOTE_TAG" >> "$GITHUB_OUTPUT"
        echo "The remote version is $REMOTE_TAG"
    - name: Is this version already archived?
      id: local_release
      run: |
        # Check if any version in metadata.json already has this name
        REMOTE_TAG="${{ steps.remote_release.outputs.VERSION }}"
        # Tags may have a 'v' prefix (e.g. v0.7.2) while metadata uses bare version (0.7.2)
        BARE_VERSION="${REMOTE_TAG#v}"
        ARCHIVED=$(jq -r --arg name "$BARE_VERSION" '[.versions[] | select(.name == $name)] | length' ./dist/metadata.json)
        if [ "$ARCHIVED" -gt 0 ]; then
          echo "VERSION=$REMOTE_TAG" >> "$GITHUB_OUTPUT"
          echo "Already archived: $BARE_VERSION"
        else
          echo "VERSION=" >> "$GITHUB_OUTPUT"
          echo "Not yet archived, update needed for $BARE_VERSION"
        fi
  update:
    name: Update
    runs-on: ubuntu-latest
    needs: check_for_updates
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    if: needs.check_for_updates.outputs.has_updates == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Checkout the release tag
        id: graypaper_update
        run: |
          RELEASE_TAG="${{ needs.check_for_updates.outputs.release_tag }}"
          cd graypaper
          git fetch --tags
          git checkout "$RELEASE_TAG"
          echo "VERSION=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          cd ..
          scripts/build-pdf-docker.sh
      - name: Use git as github actions bot
        run: |
          BOT_NAME="github-actions[bot]"
          BOT_EMAIL="$(gh api /users/github-actions[bot] | jq -r '.id')+$BOT_NAME@users.noreply.github.com"
          git config --global user.name $BOT_NAME
          git config --global user.email $BOT_EMAIL
      - name: Create a PR and merge changes to the main branch
        run: |
          BRANCH_NAME="feature/${{steps.graypaper_update.outputs.VERSION}}"
          git checkout -b $BRANCH_NAME
          git add .
          git commit -m "Bumped Graypaper to ${{steps.graypaper_update.outputs.VERSION}}"
          git push --set-upstream origin $BRANCH_NAME
          gh pr create -B main -H $BRANCH_NAME \
            --title "Bump Graypaper to ${{steps.graypaper_update.outputs.VERSION}}" --body ""
          gh pr merge --rebase --delete-branch
      - name: Create Release
        run: |
          gh release create ${{ steps.graypaper_update.outputs.VERSION }} \
            -t "Release ${{ steps.graypaper_update.outputs.VERSION }}" \
            -n "Bumped Graypaper version to ${{steps.graypaper_update.outputs.VERSION}}"
       
